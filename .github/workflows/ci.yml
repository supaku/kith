name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + test (macOS ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14's latest Xcode (16.0) ships Swift 6.0; SQLite.swift requires
        # swift-tools 6.1. Keep macOS 14 as a deployment target, but build on 15.
        os: [macos-15]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode 16 (Swift 6 toolchain)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift toolchain
        run: |
          swift --version
          xcrun swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ matrix.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-spm-

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test --parallel

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
