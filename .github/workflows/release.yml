name: Release

# Triggered when a tag matching v*.*.* is pushed.
#
# Phase A (legacy): unsigned arm64 binary tarball attached to a GitHub Release.
# Phase B (current): signed + notarized via Apple Developer ID, then the
# `supaku/homebrew-tools` cask is auto-bumped so `brew install kith` resolves
# to the freshly notarized binary.
#
# Required org-level secrets (already provisioned with all-repo access):
#
#   APPLE_DEVELOPER_ID_CERT_BASE64    base64 of the Developer ID .p12
#   APPLE_DEVELOPER_ID_CERT_PASSWORD  password for the .p12
#   APPLE_DEVELOPER_ID                Apple ID email (for notarytool)
#   APPLE_PASSWORD                    app-specific password
#   APPLE_TEAM_ID                     10-char team id
#   HOMEBREW_TAP_GITHUB_TOKEN         fine-grained PAT with contents:write on
#                                     supaku/homebrew-tools (used by the
#                                     bump-cask step below)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    # Lifting secrets to the job env block lets us gate the sign step on
    # `env.X != ''`, which is the only way to do that — `secrets.*` is not
    # available inside step `if:` conditions.
    env:
      APPLE_DEVELOPER_ID_CERT_BASE64:   ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID:               ${{ secrets.APPLE_DEVELOPER_ID }}
      APPLE_PASSWORD:                   ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID:                    ${{ secrets.APPLE_TEAM_ID }}
      HOMEBREW_TAP_GITHUB_TOKEN:        ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select Xcode 16 (Swift 6 toolchain)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          fi

          source version.env
          if [[ "$KITH_VERSION" != "$VERSION" ]]; then
            echo "::error::version.env has ${KITH_VERSION}, but the release tag requests ${VERSION}"
            exit 1
          fi

          CLI_BUNDLE_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Sources/kith/Resources/Info.plist)"
          APP_SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Sources/KithApp/Resources/Info.plist)"
          APP_BUNDLE_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Sources/KithApp/Resources/Info.plist)"
          for checked_version in "$CLI_BUNDLE_VERSION" "$APP_SHORT_VERSION" "$APP_BUNDLE_VERSION"; do
            if [[ "$checked_version" != "$VERSION" ]]; then
              echo "::error::a checked-in Info.plist version (${checked_version}) does not match ${VERSION}"
              exit 1
            fi
          done

          grep -Fq "let agentVersion = \"${VERSION}\"" Sources/KithAgent/main.swift
          grep -Fq "tag: \"v${VERSION}\"" Formula/kith.rb
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Stamp BuildInfo
        run: |
          BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > Sources/kith/Generated/BuildInfo.swift <<EOF
          import Foundation

          enum BuildInfo {
              static let name = "kith"
              static let version = "${{ steps.version.outputs.version }}"
              static let commit = "${{ steps.version.outputs.commit }}"
              static let platform = "macOS 14+"
              static let builtAt = "${BUILT_AT}"
          }
          EOF

      - name: swift build -c release
        run: swift build -c release --arch arm64

      - name: Stage Kith.app + CLI
        # v0.2.0+ flow: package.sh has two subcommands. `stage` assembles
        # dist/staging/{kith, libexec/, Kith.app/}; sign-and-notarize.sh then
        # signs in place; `tarball` zips the (signed) staging dir into the
        # release artifact. Keeps the codesign step inside the .app bundle
        # boundary so notarytool/stapler can attest the whole layout.
        run: bash scripts/package.sh stage dist/staging

      - name: Sign + notarize
        if: ${{ env.APPLE_DEVELOPER_ID_CERT_BASE64 != '' }}
        run: scripts/sign-and-notarize.sh dist/staging

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          ARCHIVE="dist/kith-${{ steps.version.outputs.version }}-macos-arm64.tar.gz"
          bash scripts/package.sh tarball dist/staging "$ARCHIVE"
          SHA256="$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')"
          echo "$SHA256  $(basename "$ARCHIVE")" > "$ARCHIVE.sha256"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"   >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Smoke test packaged tarball
        # Extracts the artifact users will actually receive and exercises
        # the resource-bundle load path. v0.2.0+ requires KITH_DB_PATH
        # because `chats` otherwise tries to round-trip via the agent
        # (which doesn't exist in CI). KITH_DB_PATH triggers the CLI's
        # local-mode fallback, which still loads SwiftPM resource bundles.
        run: |
          set -euo pipefail
          EXTRACT="$(mktemp -d)"
          tar -C "$EXTRACT" -xzf "${{ steps.package.outputs.archive }}"
          for needed in kith libexec/kith Kith.app/Contents/Info.plist \
                        Kith.app/Contents/MacOS/KithApp \
                        Kith.app/Contents/MacOS/KithAgent \
                        Kith.app/Contents/Library/LaunchAgents/com.supaku.kith.agent.plist \
                        Kith.app/Contents/Resources/PhoneNumberKit_PhoneNumberKit.bundle \
                        Kith.app/Contents/Resources/SQLite.swift_SQLite.bundle; do
            if [[ ! -e "$EXTRACT/$needed" ]]; then
              echo "::error::tarball missing $needed"
              exit 1
            fi
          done
          ln -s "$EXTRACT/kith" "$EXTRACT/kith-link"
          "$EXTRACT/kith-link" version
          OUTPUT="$(KITH_DB_PATH="/tmp/kith-ci-nonexistent.db" "$EXTRACT/kith-link" chats --jsonl 2>&1 || true)"
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "could not load resource bundle"; then
            echo "::error::SwiftPM resource bundle missing from packaged tarball"
            exit 1
          fi
          echo "==> packaged tarball layout verified + resource bundles load"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: kith ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

      - name: Bump supaku/homebrew-tools cask
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256:  ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          TAP_DIR="${RUNNER_TEMP}/homebrew-tools"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/supaku/homebrew-tools.git" "$TAP_DIR"
          export CASK_PATH="$TAP_DIR/Casks/kith.rb"

          python3 - <<'PY'
          import os, pathlib, re

          version = os.environ["VERSION"]
          sha     = os.environ["SHA256"]
          path    = pathlib.Path(os.environ["CASK_PATH"])

          src = path.read_text()
          src = re.sub(r'version\s+"[^"]+"', f'version "{version}"', src, count=1)
          src = re.sub(r'sha256\s+"[^"]+"',  f'sha256  "{sha}"',     src, count=1)
          path.write_text(src)
          PY

          cd "$TAP_DIR"
          brew style --cask "$CASK_PATH"
          git config user.name  "supaku-bot"
          git config user.email "bot@supaku.invalid"
          git add Casks/kith.rb
          if git diff --cached --quiet; then
            echo "note: cask already at version ${VERSION} with this sha; nothing to commit"
            exit 0
          fi
          git commit -m "kith ${VERSION}: bump cask"
          git push origin HEAD
